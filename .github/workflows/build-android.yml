name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            build-essential libffi-dev libssl-dev \
            libsqlite3-dev zlib1g-dev libbz2-dev \
            liblzma-dev autoconf libtool pkg-config \
            cmake libglib2.0-dev python3-pip

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))" >> $GITHUB_ENV

      - name: Cache Buildozer global
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('android/buildozer.spec') }}-v3

      - name: Cache Buildozer android dir
        uses: actions/cache@v4
        with:
          path: android/.buildozer
          key: buildozer-android-${{ hashFiles('android/buildozer.spec') }}-v3

      - name: Install Python build tools
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.33 buildozer==1.5.0

      - name: Pre-accept Android SDK licenses
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee" \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          printf "84831b9409646a918e30573bab4c9c91346d8abd" \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          printf "33b6a2b64607f11b759f320ef9dff4ae5c47d97a" \
            > ~/.buildozer/android/platform/android-sdk/licenses/google-gdk-license

      - name: Build APK
        working-directory: android
        run: |
          yes | buildozer -v android debug 2>&1 | tee build.log
          echo "Build exit code: $?"

      - name: Check APK
        working-directory: android
        run: |
          ls -lh bin/*.apk 2>/dev/null && echo "APK found!" || echo "No APK generated"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: RawViewer-debug
          path: android/bin/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: android/build.log
          if-no-files-found: ignore
          retention-days: 7
