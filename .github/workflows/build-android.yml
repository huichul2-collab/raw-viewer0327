name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            build-essential libffi-dev libssl-dev \
            libsqlite3-dev zlib1g-dev libbz2-dev \
            liblzma-dev autoconf libtool pkg-config \
            libltdl-dev cmake libglib2.0-dev \
            python3-pip python3-setuptools

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))" >> $GITHUB_ENV

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('android/buildozer.spec') }}

      - name: Cache Buildozer global
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ hashFiles('android/buildozer.spec') }}

      - name: Cache Buildozer Android
        uses: actions/cache@v4
        with:
          path: android/.buildozer
          key: buildozer-android-${{ hashFiles('android/buildozer.spec') }}

      - name: Install Python build tools
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.33
          pip install buildozer==1.5.0

      - name: Verify buildozer installation
        run: |
          buildozer --version

      - name: Build APK
        working-directory: android
        run: |
          set -o pipefail
          yes | buildozer -v android debug 2>&1 | tee build.log
          echo "=== LAST 50 LINES OF BUILD LOG ==="
          tail -50 build.log

      - name: Verify APK was created
        working-directory: android
        run: |
          ls -la bin/ 2>/dev/null || { echo "ERROR: bin/ directory not found — APK was not built"; exit 1; }
          APK=$(find bin -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No .apk file found in bin/"
            exit 1
          fi
          echo "APK built successfully: $APK"
          ls -lh "$APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RawViewer-debug
          path: android/bin/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload build log (always)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: android/build.log
          if-no-files-found: ignore
          retention-days: 7
